<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 HMM 수련회 유형 테스트</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    background: linear-gradient(180deg, #fff6e9 0%, #ffeede 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fffaf3;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(180, 120, 60, 0.15);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .top-emoji {
    text-align: center;
    font-size: 40px;
    margin-bottom: 4px;
  }
  h1 {
    text-align: center;
    font-size: 19px;
    font-weight: 700;
    color: #7a4a1f;
    margin: 0 0 4px;
  }
  .sub {
    text-align: center;
    font-size: 13px;
    color: #b08756;
    margin-bottom: 20px;
  }
  .progress-wrap {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #b08756;
    margin-bottom: 6px;
  }
  .bar-bg {
    height: 8px;
    background: #f4e2c8;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff9a52, #ffb347);
    border-radius: 99px;
    transition: width 0.35s ease;
  }
  .question {
    font-size: 17px;
    font-weight: 700;
    color: #4a3320;
    text-align: center;
    margin: 0 0 18px;
    line-height: 1.5;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .opts {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .opt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1.5px solid #f0d9b5;
    background: #fff;
    font-size: 15px;
    color: #5c4429;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .opt-btn:hover {
    border-color: #ffb347;
    background: #fff6e9;
    transform: translateY(-1px);
  }
  .opt-btn:active {
    transform: scale(0.98);
  }
  .opt-icon {
    font-size: 20px;
    flex-shrink: 0;
  }
  .result-box {
    text-align: center;
    border-radius: 18px;
    padding: 28px 20px;
    color: #fff;
  }
  .result-emoji {
    font-size: 52px;
    margin-bottom: 8px;
  }
  .result-label {
    font-size: 13px;
    opacity: 0.9;
    margin: 0 0 6px;
  }
  .result-name {
    font-size: 22px;
    font-weight: 800;
    margin: 0 0 14px;
  }
  .result-desc {
    font-size: 14.5px;
    line-height: 1.65;
    margin: 0 0 16px;
    opacity: 0.97;
  }
  .result-tag {
    display: inline-block;
    font-size: 12.5px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    background: rgba(255,255,255,0.25);
  }
  .retry-btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    border-radius: 14px;
    border: 1.5px solid #f0d9b5;
    background: #fff;
    font-size: 14.5px;
    font-weight: 600;
    color: #7a4a1f;
    cursor: pointer;
    font-family: inherit;
  }
  .retry-btn:hover {
    background: #fff6e9;
  }
  .start-btn {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #ff9a52, #ffb347);
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
  }
  .start-btn:hover {
    opacity: 0.92;
  }
  .back-btn {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    border-radius: 14px;
    border: none;
    background: transparent;
    font-size: 13.5px;
    font-weight: 600;
    color: #b08756;
    cursor: pointer;
    font-family: inherit;
  }
  .back-btn:hover {
    color: #7a4a1f;
  }
  .opt-selected {
    border-color: #ffb347 !important;
    background: #fff6e9 !important;
  }
  .footer-note {
    text-align: center;
    font-size: 11.5px;
    color: #c4a172;
    margin-top: 18px;
  }
  .dressup-stage {
    position: relative;
    height: 200px;
    background: #fff6e9;
    border: 1.5px dashed #f0d9b5;
    border-radius: 16px;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .char-face {
    font-size: 38px;
    margin-bottom: 2px;
  }
  .char-slot {
    font-size: 30px;
    line-height: 1.1;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d8c3a0;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .tab-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px;
    border-radius: 12px;
    border: 1.5px solid #f0d9b5;
    background: #fff;
    font-size: 11.5px;
    color: #9c7a4d;
    cursor: pointer;
    font-family: inherit;
  }
  .tab-btn span:first-child {
    font-size: 18px;
  }
  .tab-active {
    border-color: #ffb347;
    background: #fff6e9;
    color: #7a4a1f;
    font-weight: 700;
  }
  .item-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .item-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-radius: 14px;
    border: 1.5px solid #f0d9b5;
    background: #fff;
    font-size: 13px;
    color: #5c4429;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .item-emoji {
    font-size: 22px;
    flex-shrink: 0;
  }
  .item-selected {
    border-color: #ffb347;
    background: #fff6e9;
  }
  .item-selected .item-emoji {
    transform: scale(1.1);
  }
</style>
</head>
<body>

<div class="card">
  <div id="root"></div>
</div>

<script>
const questions = [
  {q:"수련회 가는 버스를 타자마자 나는?", opts:[
    {t:"이어폰 끼고 음악 듣기", icon:"🎧", type:"A"},
    {t:"친구들이랑 수다 떨기", icon:"😂", type:"B"},
    {t:"창밖 보면서 감성에 젖기", icon:"🌳", type:"C"},
    {t:"\"찬양 틀어주세요!\"", icon:"🎤", type:"D"}]},
  {q:"찬양 시간이 시작되면?", opts:[
    {t:"누구보다 크게 찬양한다", icon:"🙌", type:"D"},
    {t:"눈 감고 집중한다", icon:"🙏", type:"C"},
    {t:"율동을 열심히 따라 한다", icon:"💃", type:"B"},
    {t:"주변 분위기를 즐긴다", icon:"😊", type:"A"}]},
  {q:"조별 모임에서 나는?", opts:[
    {t:"분위기를 띄운다", icon:"😂", type:"B"},
    {t:"나눔을 한다", icon:"🎙️", type:"D"},
    {t:"조용히 듣는다", icon:"👂", type:"C"},
    {t:"처음 보는 사람에게 먼저 말 건다", icon:"🤝", type:"A"}]},
  {q:"쉬는 시간이 생기면?", opts:[
    {t:"사진 찍으러 간다", icon:"📸", type:"B"},
    {t:"간식 먹는다", icon:"🍪", type:"A"},
    {t:"친구랑 산책한다", icon:"🚶", type:"A"},
    {t:"숙소에서 쉰다", icon:"😴", type:"C"}]},
  {q:"레크리에이션 시간이 왔다!", opts:[
    {t:"무조건 참여한다", icon:"🔥", type:"B"},
    {t:"친구 따라 참여한다", icon:"😅", type:"A"},
    {t:"응원만 열심히 한다", icon:"👏", type:"C"},
    {t:"진행을 도와준다", icon:"💛", type:"D"}]},
  {q:"수련회에서 가장 기대되는 것은?", opts:[
    {t:"찬양", icon:"🎵", type:"D"},
    {t:"말씀", icon:"📖", type:"C"},
    {t:"친구들과의 추억", icon:"🤍", type:"A"},
    {t:"맛있는 밥", icon:"🍗", type:"B"}]},
  {q:"혼자 있는 새친구를 발견했다!", opts:[
    {t:"먼저 다가간다", icon:"🤝", type:"A"},
    {t:"같이 밥 먹자고 한다", icon:"🍽️", type:"B"},
    {t:"리더에게 알려준다", icon:"🙋", type:"D"},
    {t:"눈치만 본다", icon:"👀", type:"C"}]},
  {q:"캠프파이어 시간!", opts:[
    {t:"노래 부른다", icon:"🎤", type:"D"},
    {t:"사진 찍는다", icon:"📸", type:"B"},
    {t:"불멍한다", icon:"🔥", type:"C"},
    {t:"깊은 이야기를 나눈다", icon:"🌙", type:"A"}]},
  {q:"수련회 마지막 날 나는?", opts:[
    {t:"울면서 집 간다", icon:"😭", type:"C"},
    {t:"사진 정리한다", icon:"📷", type:"B"},
    {t:"친구들과 연락처 교환한다", icon:"📱", type:"A"},
    {t:"벌써 다음 수련회 기대한다", icon:"✨", type:"D"}]},
  {q:"수련회에서 맡고 싶은 역할은?", opts:[
    {t:"찬양팀", icon:"🎸", type:"D"},
    {t:"방송·사진팀", icon:"📷", type:"B"},
    {t:"진행팀", icon:"🎤", type:"A"},
    {t:"섬김팀", icon:"💛", type:"C"}]}
];

const results = {
  A: {name:"인싸 친화형", emoji:"🤝", color:"linear-gradient(135deg, #ff8a65, #ff6f43)",
      desc:"새로운 사람에게 먼저 다가가고 관계를 만드는 데 진심인 당신! 이번 수련회에서 가장 많은 친구를 사귈 사람입니다.",
      tag:"섬김 & 진행팀 추천"},
  B: {name:"흥부자 무드메이커형", emoji:"🎉", color:"linear-gradient(135deg, #ffb347, #ff9a3d)",
      desc:"분위기를 띄우고 추억을 기록하는 당신! 어디서든 에너지를 불어넣는 수련회의 활력소입니다.",
      tag:"방송·사진팀 추천"},
  C: {name:"감성 깊은 묵상형", emoji:"🌙", color:"linear-gradient(135deg, #9b8cf2, #7d6ce8)",
      desc:"조용히 듣고 깊이 느끼는 당신! 말씀과 찬양 속에서 가장 깊은 은혜를 받는 타입입니다.",
      tag:"말씀 묵상 & 섬김팀 추천"},
  D: {name:"열정 찬양러형", emoji:"🎤", color:"linear-gradient(135deg, #4fc3a1, #2fa888)",
      desc:"누구보다 크게 찬양하고 무대를 즐기는 당신! 모두를 찬양의 자리로 이끄는 리더입니다.",
      tag:"찬양팀 추천"}
};

let screen = 'intro';
let current = 0;
const scores = {A:0,B:0,C:0,D:0};
const answers = new Array(questions.length).fill(null);
const root = document.getElementById('root');

const outfitCategories = [
  {key:'top', label:'상의', icon:'👕'},
  {key:'bottom', label:'하의', icon:'👖'},
  {key:'shoes', label:'신발', icon:'👟'},
  {key:'accessory', label:'소품', icon:'🎒'}
];

const outfitItems = {
  top: [
    {name:'화이트 티셔츠', emoji:'👕'},
    {name:'후드 집업', emoji:'🧥'},
    {name:'체크 셔츠', emoji:'👔'},
    {name:'니트', emoji:'🦺'}
  ],
  bottom: [
    {name:'청바지', emoji:'👖'},
    {name:'반바지', emoji:'🩳'},
    {name:'카고팬츠', emoji:'👖'},
    {name:'트레이닝팬츠', emoji:'🩳'}
  ],
  shoes: [
    {name:'운동화', emoji:'👟'},
    {name:'슬리퍼', emoji:'🩴'},
    {name:'워커', emoji:'🥾'},
    {name:'샌들', emoji:'👡'}
  ],
  accessory: [
    {name:'모자', emoji:'🧢'},
    {name:'선글라스', emoji:'🕶️'},
    {name:'백팩', emoji:'🎒'},
    {name:'목걸이', emoji:'📿'}
  ]
};

let outfit = {top:null, bottom:null, shoes:null, accessory:null};
let activeCategory = 'top';
let resultType = 'A';

function renderIntro(){
  root.innerHTML = `
    <div class="top-emoji">🌴</div>
    <h1>2026 HMM 수련회 유형 테스트</h1>
    <p class="sub">10개의 질문으로 알아보는 나의 수련회 스타일</p>
    <button class="start-btn" id="start">테스트 시작하기</button>
    <p class="footer-note">소요시간 약 1분</p>
  `;
  document.getElementById('start').onclick = () => {
    screen = 'quiz';
    render();
  };
}

function render(){
  if (screen === 'intro') { renderIntro(); return; }
  if (screen === 'quiz') { renderQuestion(); return; }
  if (screen === 'result') { renderResult(); return; }
  if (screen === 'dressup') { renderDressup(); return; }
}

function renderQuestion(){
  const q = questions[current];
  const pct = Math.round((current/questions.length)*100);
  root.innerHTML = `
    <div class="progress-wrap">
      <span>Q${current+1} / ${questions.length}</span>
      <span>${pct}%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
    <p class="question">${q.q}</p>
    <div class="opts" id="opts"></div>
    ${current > 0 ? '<button class="back-btn" id="back">← 이전 질문</button>' : ''}
  `;
  const wrap = root.querySelector('#opts');
  q.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (answers[current] === o.type) btn.classList.add('opt-selected');
    btn.innerHTML = `<span class="opt-icon">${o.icon}</span><span>${o.t}</span>`;
    btn.onclick = () => {
      if (answers[current]) scores[answers[current]]--;
      scores[o.type]++;
      answers[current] = o.type;
      current++;
      if (current >= questions.length) screen = 'result';
      render();
    };
    wrap.appendChild(btn);
  });
  if (current > 0) {
    document.getElementById('back').onclick = () => {
      current--;
      render();
    };
  }
}

function renderResult(){
  let top = 'A';
  Object.keys(scores).forEach(k => { if (scores[k] > scores[top]) top = k; });
  resultType = top;
  const r = results[top];
  root.innerHTML = `
    <div class="result-box" style="background:${r.color}">
      <div class="result-emoji">${r.emoji}</div>
      <p class="result-label">당신의 수련회 유형은</p>
      <p class="result-name">${r.name}</p>
      <p class="result-desc">${r.desc}</p>
      <span class="result-tag">${r.tag}</span>
    </div>
    <button class="start-btn" id="next-game">👕 코디 게임 하러 가기</button>
    <button class="retry-btn" id="retry">🔄 다시 테스트하기</button>
  `;
  document.getElementById('next-game').onclick = () => {
    screen = 'dressup';
    render();
  };
  document.getElementById('retry').onclick = () => {
    screen = 'intro';
    current = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    answers.fill(null);
    render();
  };
}

function renderDressup(){
  const r = results[resultType];
  root.innerHTML = `
    <div class="top-emoji">👗</div>
    <h1>나만의 수련회 코디 완성하기</h1>
    <p class="sub">상의·하의·신발·소품을 골라 코디를 완성해보세요</p>

    <div class="dressup-stage">
      <div class="char-face">😊</div>
      <div class="char-slot" id="slot-accessory">${outfit.accessory ? outfit.accessory.emoji : ''}</div>
      <div class="char-slot" id="slot-top">${outfit.top ? outfit.top.emoji : '➖'}</div>
      <div class="char-slot" id="slot-bottom">${outfit.bottom ? outfit.bottom.emoji : '➖'}</div>
      <div class="char-slot" id="slot-shoes">${outfit.shoes ? outfit.shoes.emoji : '➖'}</div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="item-grid" id="items"></div>

    <button class="start-btn" id="complete-btn">코디 완성! 🎉</button>
    <button class="back-btn" id="back-to-result">← 결과 화면으로</button>
  `;

  const tabsWrap = root.querySelector('#tabs');
  outfitCategories.forEach(cat => {
    const tb = document.createElement('button');
    tb.className = 'tab-btn' + (activeCategory === cat.key ? ' tab-active' : '');
    tb.innerHTML = `<span>${cat.icon}</span><span>${cat.label}</span>`;
    tb.onclick = () => {
      activeCategory = cat.key;
      renderDressup();
    };
    tabsWrap.appendChild(tb);
  });

  const itemsWrap = root.querySelector('#items');
  outfitItems[activeCategory].forEach(item => {
    const ib = document.createElement('button');
    const selected = outfit[activeCategory] && outfit[activeCategory].name === item.name;
    ib.className = 'item-btn' + (selected ? ' item-selected' : '');
    ib.innerHTML = `<span class="item-emoji">${item.emoji}</span><span class="item-name">${item.name}</span>`;
    ib.onclick = () => {
      outfit[activeCategory] = selected ? null : item;
      renderDressup();
    };
    itemsWrap.appendChild(ib);
  });

  document.getElementById('back-to-result').onclick = () => {
    screen = 'result';
    render();
  };

  document.getElementById('complete-btn').onclick = () => {
    renderDressupComplete();
  };
}

function renderDressupComplete(){
  const filled = Object.values(outfit).filter(Boolean).length;
  root.innerHTML = `
    <div class="result-box" style="background:linear-gradient(135deg, #ffb6c1, #ff8fab)">
      <div class="dressup-stage" style="background:rgba(255,255,255,0.15); margin-bottom:14px;">
        <div class="char-face">😊</div>
        <div class="char-slot">${outfit.accessory ? outfit.accessory.emoji : ''}</div>
        <div class="char-slot">${outfit.top ? outfit.top.emoji : ''}</div>
        <div class="char-slot">${outfit.bottom ? outfit.bottom.emoji : ''}</div>
        <div class="char-slot">${outfit.shoes ? outfit.shoes.emoji : ''}</div>
      </div>
      <p class="result-label">코디 완성!</p>
      <p class="result-name" style="font-size:18px;">${filled} / 4 아이템 착용</p>
      <p class="result-desc">${filled === 4 ? '완벽한 수련회 룩이에요! 이대로 출발해도 좋겠어요.' : '몇 가지를 더 골라서 코디를 완성해보세요.'}</p>
    </div>
    <button class="start-btn" id="edit-again">👕 다시 코디하기</button>
    <button class="retry-btn" id="restart-all">🔄 처음부터 다시</button>
  `;
  document.getElementById('edit-again').onclick = () => {
    screen = 'dressup';
    render();
  };
  document.getElementById('restart-all').onclick = () => {
    screen = 'intro';
    current = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    answers.fill(null);
    outfit = {top:null, bottom:null, shoes:null, accessory:null};
    render();
  };
}

render();
</script>
