// ===== 공유 기능 =====
// 카카오 디벨로퍼스(https://developers.kakao.com)에서 발급받은

const KAKAO_JS_KEY = '1ebbdbe961d0a5dc1c6ea70c7700864c';

if (window.Kakao && KAKAO_JS_KEY && !Kakao.isInitialized()) {
  Kakao.init(KAKAO_JS_KEY);
}

function showToast(msg){
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function copyShareLink(){
  const url = location.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('링크가 복사됐어요! 📋');
    }).catch(() => {
      window.prompt('아래 링크를 복사해주세요', url);
    });
  } else {
    window.prompt('아래 링크를 복사해주세요', url);
  }
}

function nativeShare(title, text){
  if (navigator.share) {
    navigator.share({ title, text, url: location.href }).catch(() => {});
  } else {
    copyShareLink();
  }
}

function shareKakao(title, desc){
  if (window.Kakao && Kakao.isInitialized()) {
    Kakao.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: title,
        description: desc,
        imageUrl: location.origin + location.pathname.replace(/\/[^/]*$/, '') + '/assets/body.png',
        link: { mobileWebUrl: location.href, webUrl: location.href }
      },
      buttons: [{ title: '나도 해보기', link: { mobileWebUrl: location.href, webUrl: location.href } }]
    });
  } else {
    showToast('카카오 공유 키가 설정되지 않아 링크를 복사할게요');
    copyShareLink();
  }
}

// ===== 코디 합성 이미지 생성 =====
function loadImg(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function buildCompositeImage(){
  const W = 900, H = 900;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#fff6e9';
  ctx.fillRect(0, 0, W, H);

  // body/face/의상 PNG는 모두 같은 900x900 캔버스 기준으로 정렬되어 있어
  // 그대로 풀사이즈로 겹치기만 하면 됨
  async function drawFull(item){
    if (!item) return;
    const img = await loadImg(`${ASSET}/${item.file}`);
    ctx.drawImage(img, 0, 0, W, H);
  }

  await drawFull(outfit.hair);
  await drawFull({file:'body.png'});
  await drawFull(outfit.bangs);
  await drawFull({file:'face.png'});
  await drawFull(outfit.top);
  await drawFull(outfit.bottom);
  await drawFull(outfit.shoes);
  await drawFull(outfit.item);

  const r = results[resultType];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7a4a1f';
  ctx.font = 'bold 38px "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';
  ctx.fillText('2026 HMM 수련회', W / 2, 64);
  ctx.font = 'bold 28px "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';
  ctx.fillStyle = '#ff7a3d';
  ctx.fillText(`${r.name} 코디 완성! 🎉`, W / 2, 104);

  return canvas;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function saveCompositeImage(){
  showToast('이미지를 만들고 있어요...');
  try {
    const canvas = await buildCompositeImage();
    canvas.toBlob((blob) => {
      downloadBlob(blob, 'hmm_coordi.png');
      showToast('이미지가 저장됐어요! 📷');
    }, 'image/png');
  } catch (e) {
    showToast('이미지 생성에 실패했어요 😢');
  }
}

            files: [file],
            title: 'HMM 수련회 코디 완성!',
            text: `나는 "${r.name}"! 코디까지 완성했어 🎉 너도 해봐 → ${location.href}`
          });
        } catch (e) { /* 사용자가 취소함 */ }
      } else {
        downloadBlob(blob, 'hmm_coordi.png');
        showToast('이미지가 저장됐어요! 카톡방에 직접 첨부해주세요 💛');
      }
    }, 'image/png');
  } catch (e) {
    showToast('이미지 생성에 실패했어요 😢');
  }
}
// ===== 코디 합성 이미지 생성 끝 =====

const outfitCategories = [
  {key:'hair', label:'머리', icon:'💇'},
  {key:'bangs', label:'앞머리', icon:'✂️'},
  {key:'top', label:'상의', icon:'👕'},
  {key:'bottom', label:'하의', icon:'👖'},
  {key:'shoes', label:'신발', icon:'👟'},
  {key:'item', label:'아이템', icon:'🎒'}
];

const ASSET = 'assets';

// 머리(뒷머리, 맨 뒤 레이어)
const hairItemsList = [
  {name:'긴 생머리', file:'hair/hair_long.png'}
];

// 앞머리(표정보다 앞 레이어)
const bangsItemsList = [
  {name:'단발 앞머리', file:'bangs/bangs_bob.png'}
];

const outfitItems = {
  top: [
    {name:'화이트 반팔티', file:'top/top_white.png'},
    {name:'네이비 반팔티', file:'top/top_navy.png'}
  ],
  bottom: [
    {name:'블랙 슬랙스', file:'bottom/pants_black.png'}
  ],
  shoes: [
    {name:'화이트 스니커즈', file:'shoes/shoes_sneaker.png'}
  ],
  item: [
    {name:'안경', file:'item/glasses.png'},
    {name:'캠프 모자', file:'item/cap.png'},
    {name:'텀블러', file:'item/tumbler.png'},
    {name:'성경책', file:'item/bible.png'}
  ]
};

let outfit = {hair:null, bangs:null, top:null, bottom:null, shoes:null, item:null};
let activeCategory = 'hair';
let resultType = 'A';

function renderResult(){
  let top = 'A';
  Object.keys(scores).forEach(k => { if (scores[k] > scores[top]) top = k; });
  resultType = top;
  const r = results[top];
  root.innerHTML = `
    <div class="result-box" style="background:${r.color}">
      <div class="result-emoji">${r.emoji}</div>
      <p class="result-label">당신의 수련회 유형은</p>
      <p class="result-name">${r.name}</p>
      <p class="result-desc">${r.desc}</p>
      <span class="result-tag">${r.tag}</span>
    </div>
    <button class="start-btn" id="next-game">👕 코디 게임 하러 가기</button>
    <button class="retry-btn" id="retry">🔄 다시 테스트하기</button>
  `;
  document.getElementById('next-game').onclick = () => {
    screen = 'dressup';
    render();
  };
  document.getElementById('retry').onclick = () => {
    screen = 'intro';
    current = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    answers.fill(null);
    render();
  };
}

function stageHTML(){
  return `
    <div class="dressup-stage">
      ${outfit.hair ? `<img class="stage-full" src="${ASSET}/${outfit.hair.file}" alt="${outfit.hair.name}" style="z-index:1;" />` : ''}
      <img class="stage-full" src="${ASSET}/body.png" alt="캐릭터" style="z-index:2;" />
      ${outfit.bangs ? `<img class="stage-full" src="${ASSET}/${outfit.bangs.file}" alt="${outfit.bangs.name}" style="z-index:3;" />` : ''}
      <img class="stage-full" src="${ASSET}/face.png" alt="얼굴" style="z-index:4;" />
      ${outfit.top ? `<img class="stage-full" src="${ASSET}/${outfit.top.file}" alt="${outfit.top.name}" style="z-index:5;" />` : ''}
      ${outfit.bottom ? `<img class="stage-full" src="${ASSET}/${outfit.bottom.file}" alt="${outfit.bottom.name}" style="z-index:6;" />` : ''}
      ${outfit.shoes ? `<img class="stage-full" src="${ASSET}/${outfit.shoes.file}" alt="${outfit.shoes.name}" style="z-index:7;" />` : ''}
      ${outfit.item ? `<img class="stage-full" src="${ASSET}/${outfit.item.file}" alt="${outfit.item.name}" style="z-index:8;" />` : ''}
    </div>
  `;
}

function getActiveList(){
  if (activeCategory === 'hair') return hairItemsList;
  if (activeCategory === 'bangs') return bangsItemsList;
  return outfitItems[activeCategory];
}

function renderDressup(){
  root.innerHTML = `
    <div class="top-emoji">👗</div>
    <h1>나만의 수련회 코디 완성하기</h1>
    <p class="sub">머리·앞머리·상의·하의·아이템·배경을 골라보세요</p>
    ${stageHTML()}
    <div class="tabs" id="tabs"></div>
    <div class="item-grid" id="items"></div>
    <button class="start-btn" id="complete-btn">코디 완성! 🎉</button>
    <button class="back-btn" id="back-to-result">← 결과 화면으로</button>
  `;

  const tabsWrap = root.querySelector('#tabs');
  outfitCategories.forEach(cat => {
    const tb = document.createElement('button');
    tb.className = 'tab-btn' + (activeCategory === cat.key ? ' tab-active' : '');
    tb.innerHTML = `<span>${cat.icon}</span><span>${cat.label}</span>`;
    tb.onclick = () => { activeCategory = cat.key; renderDressup(); };
    tabsWrap.appendChild(tb);
  });

  const itemsWrap = root.querySelector('#items');
  const noneBtn = document.createElement('button');
  noneBtn.className = 'item-btn item-none' + (!outfit[activeCategory] ? ' item-selected' : '');
  noneBtn.innerHTML = `<span>➖</span><span>선택 안함</span>`;
  noneBtn.onclick = () => { outfit[activeCategory] = null; renderDressup(); };
  itemsWrap.appendChild(noneBtn);

  getActiveList().forEach(item => {
    const selected = outfit[activeCategory] && outfit[activeCategory].name === item.name;
    const ib = document.createElement('button');
    ib.className = 'item-btn' + (selected ? ' item-selected' : '');
    ib.innerHTML = `<img src="${ASSET}/${item.file}" alt="${item.name}" /><span>${item.name}</span>`;
    ib.onclick = () => { outfit[activeCategory] = item; renderDressup(); };
    itemsWrap.appendChild(ib);
  });

  document.getElementById('back-to-result').onclick = () => { screen = 'result'; render(); };
  document.getElementById('complete-btn').onclick = () => { renderDressupComplete(); };
}

function renderDressupComplete(){
  const keys = ['hair','bangs','top','bottom','shoes','item'];
  const filled = keys.filter(k => outfit[k]).length;
  root.innerHTML = `
    <div class="top-emoji">🎉</div>
    <h1>코디 완성!</h1>
    <p class="sub">${filled} / ${keys.length} 항목 완성</p>
    ${stageHTML()}
    <button class="start-btn" id="share-image-btn">📷 코디 이미지로 공유하기</button>
    <button class="retry-btn" id="save-image-btn">💾 이미지 저장</button>
    <button class="back-btn" id="edit-again">👕 다시 코디하기</button>
    <p class="footer-note" style="margin-top:14px;">또는 링크로 공유하기</p>
    ${shareRowHTML()}
    <button class="back-btn" id="restart-all">🔄 처음부터 다시</button>
  `;
  bindShareRow('내 HMM 수련회 코디 완성! 🎉', '너도 코디 게임 해볼래?');
  document.getElementById('share-image-btn').onclick = () => shareCompositeImage();
  document.getElementById('save-image-btn').onclick = () => saveCompositeImage();
  document.getElementById('edit-again').onclick = () => { screen = 'dressup'; render(); };
  document.getElementById('restart-all').onclick = () => {
    screen = 'intro';
    current = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    answers.fill(null);
    outfit = {hair:null, bangs:null, top:null, bottom:null, shoes:null, item:null};
    render();
  };
}

function renderIntro(){
  root.innerHTML = `
    <div class="top-emoji">🌴</div>
    <h1>2026 HMM 수련회 유형 테스트</h1>
    <p class="sub">10개의 질문으로 알아보는 나의 수련회 스타일</p>
    <button class="start-btn" id="start">테스트 시작하기</button>
    <p class="footer-note">소요시간 약 1분</p>
  `;
  document.getElementById('start').onclick = () => {
    screen = 'quiz';
    render();
  };
}

function render(){
  if (screen === 'intro') { renderIntro(); return; }
  if (screen === 'quiz') { renderQuestion(); return; }
  if (screen === 'result') { renderResult(); return; }
  if (screen === 'dressup') { renderDressup(); return; }
}

function renderQuestion(){
  const q = questions[current];
  const pct = Math.round((current/questions.length)*100);
  root.innerHTML = `
    <div class="progress-wrap">
      <span>Q${current+1} / ${questions.length}</span>
      <span>${pct}%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
    <p class="question">${q.q}</p>
    <div class="opts" id="opts"></div>
    ${current > 0 ? '<button class="back-btn" id="back">← 이전 질문</button>' : ''}
  `;
  const wrap = root.querySelector('#opts');
  q.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (answers[current] === o.type) btn.classList.add('opt-selected');
    btn.innerHTML = `<span class="opt-icon">${o.icon}</span><span>${o.t}</span>`;
    btn.onclick = () => {
      if (answers[current]) scores[answers[current]]--;
      scores[o.type]++;
      answers[current] = o.type;
      current++;
      if (current >= questions.length) screen = 'result';
      render();
    };
    wrap.appendChild(btn);
  });
  if (current > 0) {
    document.getElementById('back').onclick = () => {
      current--;
      render();
    };
  }
}

render();
</script>

</body>
</html>
